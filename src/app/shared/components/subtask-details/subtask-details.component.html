<div class="card flex justify-content-center">
    @if (actionGoal) {
        <p-dialog 
            [header]=" actionGoal.name " 
            (onHide)="hideDialog()" 
            [modal]="true" 
            [(visible)]="visible" 
            [style]="{ width: '25rem' }"
        >

        <p>
            {{ actionGoal.description }}
        </p>

        <p-button label="Mark as completed" (click)="markAsCompleted()" />

        <section class="add-comment">
            <p> Add your comments </p>
            <textarea 
                rows="5" 
                cols="30" 
                #Comment 
                formControlName="text">
            </textarea>

            <p-button label="Add comment" (click)="addComment(Comment.value)" />

        </section>

        <section class="comments">
            @for (comment of actionGoal.comments; track $index) {
                <p class="comment"> {{ comment }} </p>
            }
        </section>
        </p-dialog>
    }
  </div>
